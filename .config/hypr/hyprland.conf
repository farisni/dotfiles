# 参考 https://wiki.hypr.land/Configuring/Dwindle-Layout/ 获取更多信息
dwindle {
    pseudotile = true # 伪平铺开关。启用后可通过主修饰键 + P 切换
    preserve_split = true # 你可能需要开启此选项
}

# 参考 https://wiki.hypr.land/Configuring/Master-Layout/ 获取更多信息
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # 设为 0 或 1 可禁用动漫吉祥物壁纸
    disable_hyprland_logo = false # 设为 true 可禁用随机 Hyprland logo / 动漫女孩背景 :(
}


#############
###  输入  ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    

    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.3 # -1.0 至 1.0，0 表示不修改

    touchpad {
        natural_scroll = true
    }
}

# 参考 https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal,scale:3.0, workspace

# 单设备配置示例
# 参考 https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs 获取更多信息
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
###   快捷键    ###
###################

# 参考 https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # 设置 "Windows" 键为主修饰键

# 快捷键示例，参考 https://wiki.hypr.land/Configuring/Binds/ 获取更多信息
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle 布局
bind = $mainMod, J, layoutmsg, togglesplit # dwindle 布局


# Win + V: 呼出剪贴板历史，输入搜索，回车粘贴
#bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
#bind = SUPER, V, exec, cliphist list | rofi -dmenu -p "Clipboard History" | cliphist decode | wl-copy

bind = SUPER, V, exec, ~/.config/hypr/wofi-clipboard.sh

#bind = SUPER, V, exec, cliphist list | rofi -dmenu -p "Clip" | cliphist decode | wl-copy

# 截图
bind = $mainMod SHIFT, S, exec, env GRIMBLAST_EDITOR="swappy -f" grimblast edit area


# Alt + Space 打开应用启动器
bind = ALT, SPACE, exec, wofi --show drun --show-run
#bind = ALT, SPACE, exec, rofi -show drun -modi drun,run -p "Run"

# 使用主修饰键 + 方向键移动焦点
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# 使用主修饰键 + [0-9] 切换工作区
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# 使用主修饰键 + SHIFT + [0-9] 将活动窗口移动到指定工作区
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# 特殊工作区示例（临时工作区/便签板）
bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# 使用主修饰键 + 滚轮滚动切换工作区
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# 使用主修饰键 + 左键/右键拖拽来移动/调整窗口大小
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow





# 笔记本多媒体按键：音量和屏幕亮度控制
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# 需要 playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
###      窗口与工作区      ###
##############################

# 参考 https://wiki.hypr.land/Configuring/Window-Rules/ 获取更多信息
# 参考 https://wiki.hypr.land/Configuring/Workspace-Rules/ 获取工作区规则

# 常用的窗口规则示例

windowrule {
    # 忽略所有应用的最大化请求。你可能会喜欢这个设置
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # 修复 XWayland 下的一些拖拽问题
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland 启动窗口的窗口规则
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# --- 手动添加：强制开启 Kitty 模糊 ---
windowrulev3 = addtag, blur, oncreated:^kitty$


