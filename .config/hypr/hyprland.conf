################
###  显示器  ###
################

# 参考 https://wiki.hypr.land/Configuring/Monitors/
#monitor=,preferred,auto,auto
monitor=eDP-1,3072x1920@120,0x0,1.6
monitor=DP-1,2560x1440@100,-256x-1152,1.25

xwayland {
    force_zero_scaling = true
}

###################
###  我的程序  ###
###################

# 参考 https://wiki.hypr.land/Configuring/Keywords/

# 设置你常用的程序
$terminal = kitty
$fileManager = dolphin
$menu = wofi


#################
###  自启动   ###
#################

# 启动必要的后台进程（如通知守护进程、状态栏等）
# 或者像这样在启动时运行你常用的应用：

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
# 启动时自动运行 Fcitx5
exec-once = fcitx5 -d -r

exec-once = waybar

exec-once = /usr/lib/polkit-kde-authentication-agent-1

# 自动记录文本历史
exec-once = wl-paste --type text --watch cliphist store

# 自动记录图片历史
exec-once = wl-paste --type image --watch cliphist store


# 启动 udisks2 监控服务 (关键！)
#exec-once = /usr/lib/udisks2/udisks2-daemon --monitor

# --- 自动挂载与通知配置 ---

# 1. 启动通知守护进程 (没有它，插入 U 盘不会弹窗)
exec-once = dunst

# 2. 启动 udiskie (核心工具：监听插入 -> 自动挂载 -> 弹窗)
exec-once = udiskie -t --no-poll


